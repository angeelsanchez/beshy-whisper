<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2D1E1A" />
  <title>Sin conexion - BESHY Whisper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background-color: #2D1E1A;
      color: #F5F0E1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      padding-top: calc(env(safe-area-inset-top, 0px) + 2rem);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 2rem);
    }
    .container { max-width: 380px; width: 100%; }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.7;
    }
    .icon svg { width: 100%; height: 100%; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.95rem;
      opacity: 0.75;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background-color: #D97706;
      color: #fff;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { opacity: 0.75; }
    .btn svg { width: 18px; height: 18px; }
    .status {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      opacity: 0.5;
    }
    .reconnecting { color: #D97706; opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h.01"/>
        <path d="M8.5 16.429a5 5 0 0 1 7 0"/>
        <path d="M5 12.859a10 10 0 0 1 5.17-2.69"/>
        <path d="M13.83 10.17A10 10 0 0 1 19 12.859"/>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
        <line x1="2" y1="2" x2="22" y2="22"/>
      </svg>
    </div>
    <h1>Sin conexion a internet</h1>
    <p>Comprueba tu conexion Wi-Fi o datos moviles e intentalo de nuevo.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
      Reintentar
    </button>
    <p class="status" id="status">Se reconectara automaticamente</p>
  </div>
  <script>
    window.addEventListener('online', function() {
      document.getElementById('status').textContent = 'Reconectando...';
      document.getElementById('status').className = 'status reconnecting';
      setTimeout(function() { window.location.reload(); }, 500);
    });
  </script>
</body>
</html>
